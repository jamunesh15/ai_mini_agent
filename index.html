<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI BRD Generator</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        textarea { width: 100%; height: 100px; margin-bottom: 1rem; padding: 0.5rem; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
        .hidden { display: none; }
        .error { color: red; font-weight: bold; }
        .loading { color: blue; font-style: italic; }
        pre { background: #f4f4f4; padding: 1rem; overflow-x: auto; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>AI-Powered BRD Generator</h2>
    <textarea id="inputText" placeholder="Enter business paragraph here..."></textarea><br>
    <button id="submitBtn">Generate BRD</button>

    <p id="loadingMsg" class="loading hidden">Processing request...</p>
    <p id="errorMsg" class="error hidden"></p>

    <div id="results" class="hidden">
        <h3>Validation Result</h3>
        <pre id="valDisplay"></pre>
        
        <h3>Requirements</h3>
        <pre id="reqDisplay"></pre>
        
        <h3>API Intents</h3>
        <pre id="apiDisplay"></pre>
    </div>

    <script>
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const text = document.getElementById('inputText').value;
            const loading = document.getElementById('loadingMsg');
            const error = document.getElementById('errorMsg');
            const results = document.getElementById('results');

            loading.classList.remove('hidden');
            error.classList.add('hidden');
            results.classList.add('hidden');

            try {
                const res = await fetch('http://localhost:8000/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: text })
                });

                if (res.status === 422) {
                    const errData = await res.json();
                    throw new Error(errData.detail);
                }
                if (!res.ok) throw new Error("Server Error occurred.");

                const data = await res.json();
                
                document.getElementById('valDisplay').textContent = JSON.stringify(data.validation, null, 2);
                document.getElementById('reqDisplay').textContent = JSON.stringify(data.brd.requirements, null, 2);
                document.getElementById('apiDisplay').textContent = JSON.stringify(data.api_intents, null, 2);
                
                results.classList.remove('hidden');
            } catch (err) {
                error.textContent = err.message;        
                error.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
